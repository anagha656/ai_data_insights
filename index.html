<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Data Insights</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .container{background:white;border-radius:16px;padding:2rem;width:100%;max-width:420px;border:1px solid #e5e5e5;}
    h1{font-size:22px;font-weight:600;margin-bottom:4px;}
    .sub{font-size:14px;color:#666;margin-bottom:1.5rem;}
    .tab-row{display:flex;gap:8px;margin-bottom:1.5rem;}
    .tab{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:white;color:#555;font-weight:500;}
    .tab.active{background:#378ADD;color:white;border-color:#378ADD;}
    .form{display:none;} .form.active{display:block;}
    .field{margin-bottom:12px;}
    .field label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
    .field input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;}
    .btn{width:100%;padding:11px;background:#378ADD;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
    .btn:hover{background:#185FA5;}
    .msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:8px;display:none;}
    .msg.success{background:#EAF3DE;color:#3B6D11;}
    .msg.error{background:#FCEBEB;color:#A32D2D;}
    .features{margin-top:1.5rem;border-top:1px solid #f0f0f0;padding-top:1.5rem;}
    .feature{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px;color:#555;}
    .ficon{font-size:16px;flex-shrink:0;}
  </style>
</head>
<body>
<div class="container">
  <h1>🤖 AI Data Insights</h1>
  <p class="sub">Upload any CSV — get instant analysis + AI answers</p>

  <div class="tab-row">
    <button class="tab active" onclick="showForm('login',this)">Login</button>
    <button class="tab" onclick="showForm('signup',this)">Sign Up</button>
  </div>

  <!-- Login -->
  <div class="form active" id="login">
    <div class="field"><label>Username</label><input id="l-user" placeholder="your username"/></div>
    <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="your password"/></div>
    <button class="btn" onclick="doLogin()">Login</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Signup -->
  <div class="form" id="signup">
    <div class="field"><label>Username</label><input id="s-user" placeholder="choose a username"/></div>
    <div class="field"><label>Email</label><input id="s-email" type="email" placeholder="your email"/></div>
    <div class="field"><label>Password</label><input id="s-pass" type="password" placeholder="min 6 characters"/></div>
    <button class="btn" onclick="doSignup()">Create Account</button>
    <div class="msg" id="signup-msg"></div>
  </div>

  <div class="features">
    <div class="feature"><span class="ficon">📊</span><span>Auto-analyze any CSV — stats, charts, correlations</span></div>
    <div class="feature"><span class="ficon">🤖</span><span>Ask AI questions about your data in plain English</span></div>
    <div class="feature"><span class="ficon">📁</span><span>Save and revisit your analysis history</span></div>
  </div>
</div>

<script>
  const API = "";

  function showForm(id, btn) {
    document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  async function doLogin() {
    const username = document.getElementById('l-user').value.trim();
    const password = document.getElementById('l-pass').value;
    const res  = await fetch(`${API}/login`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(data.error) { showMsg('login-msg', data.error, 'error'); return; }
    window.location.href = '/dashboard';
  }

  async function doSignup() {
    const username = document.getElementById('s-user').value.trim();
    const email    = document.getElementById('s-email').value.trim();
    const password = document.getElementById('s-pass').value;
    const res  = await fetch(`${API}/signup`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    if(data.error) { showMsg('signup-msg', data.error, 'error'); return; }
    showMsg('signup-msg', 'Account created! Please login.', 'success');
  }
</script>
</body>
</html>
